name: Generate Architecture Diagrams

on:
  push:
    paths:
      - 'workspace.dsl'  # Запускать только при изменении DSL
  workflow_dispatch:     # Возможность ручного запуска

jobs:
  export-diagrams:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Structurizr CLI
        run: |
          # Сначала получаем URL последнего релиза
          LATEST_URL=$(curl -s https://api.github.com/repos/structurizr/cli/releases/latest | grep "browser_download_url.*zip" | cut -d : -f 2,3 | tr -d \")
          echo "Downloading from: $LATEST_URL"
          
          # Скачиваем по правильному URL
          wget -O structurizr-cli.zip $LATEST_URL
          unzip structurizr-cli.zip
          chmod +x structurizr.sh

      - name: Export diagrams to PNG
        run: |
          ./structurizr.sh export -workspace workspace.dsl -format png -output diagrams/

      - name: Upload diagrams as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: architecture-diagrams
          path: diagrams/
