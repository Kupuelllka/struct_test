name: Generate Architecture Diagrams (Simple)

on:
  push:
    paths:
      - 'workspace.dsl'
  workflow_dispatch:

jobs:
  export-diagrams:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Structurizr CLI and PlantUML
        run: |
          # Structurizr CLI
          curl -L -o structurizr-cli.zip https://github.com/structurizr/cli/releases/latest/download/structurizr-cli.zip
          unzip structurizr-cli.zip
          chmod +x structurizr.sh
          
          # PlantUML
          curl -L -o plantuml.jar https://github.com/plantuml/plantuml/releases/download/v1.2024.0/plantuml-1.2024.0.jar

      - name: Export and convert diagrams
        run: |
          # Экспорт в PlantUML
          mkdir -p diagrams
          ./structurizr.sh export -workspace workspace.dsl -format plantuml -output diagrams/
          
          # Конвертация в PNG (прямо в ту же папку)
          java -jar plantuml.jar -tpng diagrams/*.puml
          
          # Удаляем исходные .puml файлы (опционально)
          # rm diagrams/*.puml

      - name: Upload PNG diagrams
        uses: actions/upload-artifact@v4
        with:
          name: architecture-diagrams-png
          path: diagrams/*.png
          retention-days: 30

      - name: Create PR comment with diagrams
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diagrams = fs.readdirSync('diagrams').filter(f => f.endsWith('.png'));
            
            let comment = '## 📐 Architecture Diagrams\n\n';
            
            for (const diagram of diagrams) {
              comment += `### ${diagram.replace('.png', '').replace('Structurizr-', '')}\n`;
              comment += `![${diagram}](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/raw/${process.env.GITHUB_SHA}/diagrams/${diagram})\n\n`;
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
